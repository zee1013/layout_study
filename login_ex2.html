<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="css/login_ex2.css">
</head>
<body>
    <div class="back"></div>
    <!-- 전체 박스 -->
     <div class="login-box">
        <!-- 로고 이미지 -->
        <p class="logo"><img src="image/instagram.png" alt="로고"></p>
        <!-- 입력 박스 -->
         <form action="#" class="form-wrap">
            <input type="text" placeholder="Phone number, usuername or email">
            <input type="password" placeholder="Password">
         </form>
         
         <!-- 비밀번호 관련 -->
          <div class="pw-box">
            <form action="#" class="checkbox">
            <input type="checkbox">
         </form>
            <p>Hide Password</p>
            <p>Forgot password?</p>
          </div>
          <!-- 로그인 버튼 -->
             <button>Login</button>
             <!-- OR 텍스트 -->
              <p class="or-txt">OR</p>
              <!-- 페이스북으로 로그인 -->
               <p class="facebook">Log In With Facebook</p>
     </div>
</body>
</html>
