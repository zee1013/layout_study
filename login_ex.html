<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="css/login_ex.css">
</head>
<body>
    <!-- 전체 박스 -->
     <div class="login-box">
        <!-- login btn -->
         <div class="login-btn">
            <!-- logo image -->
         <p class="logo"><img src="image/burgerking_logo.png" alt="버거킹 로고"></p>
        <!-- login txt -->
         <p class="login-txt">Log in with Google</p>
         </div>
         <!-- center "OR" txt -->
          <p class="or-txt">or</p>
          <!-- form -->
           <form action="#" class="form-wrap">
            <input type="text" placeholder="ID">
            <input type="password" placeholder="Password">
            <button>LOGIN</button>
           </form>
           <p class="forgot-txt">Forgot your password?</p>
     </div>
